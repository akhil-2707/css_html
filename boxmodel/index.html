<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position & Display Demo</title>

<style>

/* ---------- POSITION ---------- */

nav a{
    display: inline-block;
    padding: 10px 15px;
    text-decoration: none;
    color: white;
}

.top-bar{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: navy;
    color: white;
    z-index: 100;
    padding: 10px;
}

.card{
    position: relative;
    border: 1px solid #ccc;
    padding: 20px;
    min-height: 120px;
    background: #f5f5f5;
}

.badge{
    position: absolute;
    top: 10px;
    right: 10px;
    background: crimson;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
}

/* ---------- DISPLAY ---------- */

.menu{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 15px;
    background: #222;
    margin-top: 60px;
}

.menu a{
    color: white;
    text-decoration: none;
}

.cards{
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.cards .card{
    flex: 1;
    min-width: 220px;
}

</style>
</head>

<body>

<div class="top-bar">
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</div>

<div class="menu">
    <a href="#">HTML</a>
    <a href="#">CSS</a>
    <a href="#">JavaScript</a>
</div>

<div class="cards">

    <div class="card">
        <span class="badge">New</span>
        <h3>Card 1</h3>
        <p>This is the first card.</p>
    </div>

    <div class="card">
        <span class="badge">Hot</span>
        <h3>Card 2</h3>
        <p>This is the second card.</p>
    </div>

    <div class="card">
        <span class="badge">Sale</span>
        <h3>Card 3</h3>
        <p>This is the third card.</p>
    </div>

</div>

</body>
</html>an equal share */
